name: Build & Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.1.0

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: ez-trading-mac-arm64
          - os: windows-latest
            artifact: ez-trading-windows
          - os: ubuntu-latest
            artifact: ez-trading-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Install Python dependencies
        shell: bash
        run: |
          pip install pyinstaller scikit-build-core nanobind
          pip install -e ".[dev,all]" --no-build-isolation

      - name: Run tests before build
        shell: bash
        run: python -m pytest tests/ -q --tb=short -x

      - name: Build with PyInstaller
        run: |
          SEP=":"
          if [ "$RUNNER_OS" = "Windows" ]; then SEP=";"; fi
          pyinstaller \
            --name "ez-trading" \
            --onedir \
            --noconfirm \
            --clean \
            --add-data "web/dist${SEP}web/dist" \
            --add-data "configs${SEP}configs" \
            --add-data "strategies${SEP}strategies" \
            --add-data "portfolio_strategies${SEP}portfolio_strategies" \
            --add-data "cross_factors${SEP}cross_factors" \
            --add-data "factors${SEP}factors" \
            --add-data "ml_alphas${SEP}ml_alphas" \
            --add-data "data/cache${SEP}data/cache" \
            --hidden-import "ez.api.app" \
            --hidden-import "ez.api.routes.market_data" \
            --hidden-import "ez.api.routes.backtest" \
            --hidden-import "ez.api.routes.factors" \
            --hidden-import "ez.api.routes.experiments" \
            --hidden-import "ez.api.routes.candidates" \
            --hidden-import "ez.api.routes.code" \
            --hidden-import "ez.api.routes.chat" \
            --hidden-import "ez.api.routes.settings" \
            --hidden-import "ez.api.routes.research" \
            --hidden-import "ez.api.routes.portfolio" \
            --hidden-import "ez.api.routes.fundamental" \
            --hidden-import "ez.api.routes.live" \
            --hidden-import "ez.api.deps" \
            --hidden-import "ez.strategy.builtin.ma_cross" \
            --hidden-import "ez.factor.builtin.technical" \
            --hidden-import "ez.factor.builtin.fundamental" \
            --hidden-import "ez.data.providers.tushare_provider" \
            --hidden-import "ez.data.providers.tencent_provider" \
            --hidden-import "ez.data.providers.fmp_provider" \
            --hidden-import "ez.data.providers.akshare_provider" \
            --hidden-import "ez.data.fundamental" \
            --collect-submodules "ez.portfolio" \
            --collect-submodules "ez.agent" \
            --collect-submodules "ez.llm" \
            --collect-submodules "ez.core" \
            --collect-submodules "ez.data" \
            --collect-submodules "ez.factor" \
            --collect-submodules "ez.strategy" \
            --collect-submodules "ez.api" \
            --hidden-import "uvicorn.logging" \
            --hidden-import "uvicorn.loops.auto" \
            --hidden-import "uvicorn.protocols.http.auto" \
            --hidden-import "uvicorn.protocols.websockets.auto" \
            --hidden-import "uvicorn.lifespan.on" \
            --collect-submodules "uvicorn" \
            --collect-submodules "duckdb" \
            --collect-submodules "scipy" \
            --collect-submodules "numpy" \
            --hidden-import "yaml" \
            --hidden-import "webbrowser" \
            launcher.py
        shell: bash

      - name: Add README and env example
        run: |
          cp .env.example dist/ez-trading/.env.example
        shell: bash

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: cd dist && zip -r ../${{ matrix.artifact }}.zip ez-trading/

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/ez-trading -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
          body: |
            ## ez-trading ${{ github.ref_name }}

            **无需预装任何环境** — Python、依赖库全部打包在内，解压即用。

            ### 下载
            - **Mac (Apple Silicon)**: `ez-trading-mac-arm64.zip`
            - **Windows**: `ez-trading-windows.zip`
            - **Linux**: `ez-trading-linux.zip`

            ### 使用
            1. 下载解压
            2. (可选) 在解压目录创建 `.env` 文件:
               ```
               TUSHARE_TOKEN=你的token
               DEEPSEEK_API_KEY=你的key
               ```
            3. 双击 `ez-trading` (Mac/Linux) 或 `ez-trading.exe` (Windows)
            4. 浏览器自动打开 http://localhost:8000

            ### 自定义策略
            解压目录下的 `strategies/`、`portfolio_strategies/`、`cross_factors/`、`factors/` 放入 .py 文件即可使用。

            ### Docker
            ```bash
            docker compose up -d
            # 打开 http://localhost:8000
            ```
