name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: pip install scikit-build-core nanobind

      - name: Install project
        run: pip install -e ".[dev]" --no-build-isolation

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short -x

      - name: Verify version consistency
        shell: python
        run: |
          import tomllib, pathlib
          ver_toml = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          from fastapi.testclient import TestClient
          from ez.api.app import app
          ver_runtime = TestClient(app).get("/api/health").json()["version"]
          print(f"pyproject.toml: {ver_toml}")
          print(f"runtime: {ver_runtime}")
          assert ver_toml == ver_runtime, f"Version mismatch: {ver_toml} != {ver_runtime}"
