name: OpenTrading CI

on:
  push:
    tags: ['v*']          # Only run on version tags (releases)
  pull_request:
    branches: [main]
  workflow_dispatch: {}   # Manual trigger from GitHub UI

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Full matrix only on tags (releases); PR uses ubuntu-only
        os: ${{ github.event_name == 'push' && fromJSON('["ubuntu-latest", "macos-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
        python-version: ["3.12"]
    env:
      PYTHONUTF8: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install libomp (macOS — required by LightGBM)
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Install build dependencies
        run: pip install scikit-build-core nanobind

      - name: Install project (dev + ML dependencies)
        run: pip install -e ".[dev,ml-extra]" --no-build-isolation

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short -x

      - name: Verify version consistency
        shell: python
        run: |
          import tomllib, pathlib
          ver_toml = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          from fastapi.testclient import TestClient
          from ez.api.app import app
          ver_runtime = TestClient(app).get("/api/health").json()["version"]
          print(f"pyproject.toml: {ver_toml}")
          print(f"runtime: {ver_runtime}")
          assert ver_toml == ver_runtime, f"Version mismatch: {ver_toml} != {ver_runtime}"
