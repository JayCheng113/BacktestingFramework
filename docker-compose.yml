# OpenTrading 容器编排
# 启动: docker compose up
# 访问: http://localhost:8000
services:
  ez-trading:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data                              # persist database
      - ./strategies:/app/strategies                    # user strategies
      - ./portfolio_strategies:/app/portfolio_strategies # user portfolio strategies
      - ./cross_factors:/app/cross_factors              # user cross-sectional factors
      - ./factors:/app/factors                          # user factors
      - ./configs:/app/configs                          # user config overrides
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
