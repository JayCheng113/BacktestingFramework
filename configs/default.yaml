server:
  host: "0.0.0.0"
  port: 8000

database:
  path: "data/ez_trading.db"

data_sources:
  cn_stock:
    primary: "tushare"
    backup: ["tencent"]
  us_stock:
    primary: "fmp"
    backup: ["tencent"]
  hk_stock:
    primary: "tencent"
    backup: []
  timeout_seconds: 10
  max_retries: 2

backtest:
  default_initial_capital: 1000000.0
  default_commission_rate: 0.00008   # 万0.8 — QMT量化标准
  default_min_commission: 0.0        # 免五
  risk_free_rate: 0.03

strategy:
  scan_dirs:
    - "ez/strategy/builtin"
    - "strategies"

cors:
  origins:
    - "http://localhost:3000"
